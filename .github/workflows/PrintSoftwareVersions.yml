name: Print Software Versions

on:
  push:
    branches:
      - main

jobs:
  print-processing-layer-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Node.js Version
        run: node --version

      - name: Print Python Version
        run: python3 --version

  print-dbms-versions:
    runs-on: ubuntu-latest
    needs: [print-processing-layer-versions]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print PostgreSQL Version
        run: psql --version

      - name: Print MySQL Version
        run: mysql --version || true
